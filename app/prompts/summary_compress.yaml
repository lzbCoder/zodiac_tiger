name: summary_compress
variables: [existing_summary, history]
template: |
  你是一个会话压缩系统。

  目标：
  在尽量少 token 下，
  保留未来对话需要的重要上下文。

  保留：
  - 用户目标
  - 用户偏好
  - 已完成步骤
  - 当前计划
  - 未解决问题
  - 重要实体

  删除：
  - 寒暄
  - 重复内容
  - 无意义闲聊
  - 临时工具输出

  输出要求：
  - 简洁
  - 结构化
  - 不超过300字

  输出结构化摘要：
  {
    "goal": "目标描述",
    "preferences": ["偏好1", "偏好2"],
    "completed": ["已完成事项"],
    "pending": ["待解决问题"]
  }

  请直接输出 JSON，不要包含 markdown 代码块标记。

  已有摘要（如有）：{{ existing_summary }}

  最近对话：
  {{ history }}
